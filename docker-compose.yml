# version: '3.8'

services:
  # Core API Server
  flint-core:
    build:
      context: ./flint-core
      dockerfile: Dockerfile
    ports:
      - "3010:3000" # External_portal:internal_port. Map to 3000 inside the container
    env_file:
      - ./flint-core/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=flint-db # Set DB_HOST directly in docker-compose
    depends_on:
      # - db
      flint-db:
        condition: service_healthy
      # - redis
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet \"http://$$HOST:$$PORT/ping\" || exit 1"] #curl --fail -s -o /dev/null http://$HOST:$PORT/api/table/test_connection || exit 1
      interval: 5s
      retries: 10
      start_period: 30s
      timeout: 5s
    restart: unless-stopped

  # React Frontend
  flint-face:
    build:
      context: ./flint-face
      dockerfile: Dockerfile
    ports:
      - "3001:3000" # External_portal:internal_port. Map to 3000 inside the container
    env_file:
      - ./flint-face/.env
    stdin_open: true
    tty: true
    depends_on:
      flint-core: 
        condition: service_healthy
        restart: true
    healthcheck:
      test: curl --fail -s -o /dev/null http://localhost:3000 || exit 1
      interval: 10s
      retries: 3
      start_period: 30s
      timeout: 10s
    restart: unless-stopped

  # AI & Scripting Service
  flint-worker:
    build:
      context: ./flint-worker
      dockerfile: Dockerfile
    ports:
      - "3002:3000" # External_portal:internal_port. Map to 3000 inside the container
    env_file:
      - ./flint-worker/.env
      # - redis
    restart: unless-stopped

  # Database
  flint-db:
    image: mariadb:lts-ubi9
    # command: --sql_mode=""
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./flint-db/my.cnf:/etc/mysql/my.cnf   # Mount custom my.cnf
      - ./flint-db/db-backups:/docker-entrypoint-initdb.d/db-backups  # Mount the db-backups directory
      - ./flint-db/init.sql.template:/docker-entrypoint-initdb.d/init.sql.template  # Mount the SQL template
      - ./flint-db/init.sql-subst.sh:/docker-entrypoint-initdb.d/init.sql-subst.sh  # Mount the shell script
    env_file:
      - ./flint-db/.env
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 10
      start_period: 30s
      timeout: 5s
    restart: unless-stopped

  # Cache & Session Store
  # redis:
  #   image: redis:alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./rproxy
      dockerfile: Dockerfile
    ports:
      - "8090:8081"  # Single entry point
      - "7443:7443" # HTTPS
    depends_on:
      - flint-core
      - flint-face
      - flint-worker

volumes:
  db_data:
  # redis_data: